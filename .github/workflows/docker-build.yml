name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*"
  pull_request:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: get_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
            VERSION=${LAST_TAG}-SNAPSHOT-${GITHUB_SHA:0:7}
          fi
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "MAJOR=$MAJOR" >> $GITHUB_OUTPUT
          echo "MAJOR_MINOR=$MAJOR.$MINOR" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/bake-action@5be5f02ff8819ecd3092ea6b2e6261c31774f2b4 # v6.10.0
        with:
          source: .
          files: |
            docker-compose.yml
            docker-compose.dev.yml
          targets: exporter
          push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
          set: |
            exporter.tags=ghcr.io/${{ github.repository }}:${{ steps.get_version.outputs.VERSION }}
            exporter.tags=ghcr.io/${{ github.repository }}:${{ steps.get_version.outputs.MAJOR_MINOR }}
            exporter.tags=ghcr.io/${{ github.repository }}:${{ steps.get_version.outputs.MAJOR }}
            exporter.tags=ghcr.io/${{ github.repository }}:latest
